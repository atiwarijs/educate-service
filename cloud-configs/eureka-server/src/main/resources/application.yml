server:
  port: 8761
spring:
  application:
    name: EUREKA-SERVICE
#  security:
#    basic:
#      enabled: true
#    user:
#      name: eureka
#      password: 12345
eureka:
  instance:
    hostname: localhost
    nonSecurePort: ${server.port}
  client:
    register-with-eureka: true
    fetch-registry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

