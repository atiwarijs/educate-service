server:
  port: 8080
  servlet:
    context-path: /api/v1/admin
spring:
  application:
    name: admin-service
  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888/

# Eureka server config
eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
