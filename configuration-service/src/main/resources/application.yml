server:
  port: 8086
  servlet:
    context-path: /api/v1
spring:
  application:
    name: configuration-service
  profiles:
    active: pgsql

# Eureka server config
eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Rest template connection
rest:
  template:
    connect:
      timeout: 3000
    read:
      timeout: 3000
