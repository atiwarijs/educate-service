<div class="pass-container">
    <p-toast></p-toast>
    <div class="pass-card-wrapper">
        <p-card header="Change Password for {{this.username}}" styleClass="password-card">
            <div class="p-fluid">
                <form [formGroup]="passwordForm" (ngSubmit)="submit()">
                    <div class="p-field mb-3">
                        <label for="currentPassword">Current Password</label>
                        <input id="currentPassword" type="password" pInputText formControlName="currentPassword"
                            class="w-full" />
                        <small
                            *ngIf="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched"
                            class="p-error">
                            Current password is required
                        </small>
                    </div>

                    <div class="p-field mb-3">
                        <label for="newPassword">New Password</label>
                        <input id="newPassword" type="password" pInputText formControlName="newPassword"
                            class="w-full" />
                        <small
                            *ngIf="passwordForm.get('newPassword')?.hasError('required') && passwordForm.get('newPassword')?.touched"
                            class="p-error">
                            New password is required
                        </small>
                        <small
                            *ngIf="passwordForm.get('newPassword')?.hasError('minlength') && passwordForm.get('newPassword')?.touched"
                            class="p-error">
                            Password must be at least 6 characters
                        </small>
                    </div>

                    <div class="p-field mb-4">
                        <label for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" type="password" pInputText formControlName="confirmPassword"
                            class="w-full" />
                        <small
                            *ngIf="passwordForm.get('confirmPassword')?.hasError('required') && passwordForm.get('confirmPassword')?.touched"
                            class="p-error">
                            Please confirm your password
                        </small>
                        <small
                            *ngIf="passwordForm.get('confirmPassword')?.hasError('passwordMismatch') && passwordForm.get('confirmPassword')?.touched"
                            class="p-error">
                            Passwords do not match
                        </small>
                    </div>

                    <div class="flex justify-content-end">
                        <p-button type="submit" label="Update Password"
                             icon="pi pi-lock" iconPos="left"
                            styleClass="p-button-primary"></p-button>
                            <!-- [disabled]="passwordForm.invalid || isSubmitting" -->
                    </div>
                </form>
            </div>

            <p-toast></p-toast>

            <p-dialog header="Password Updated" [(visible)]="showSuccessDialog" [modal]="true"
                [style]="{width: '350px'}" [closable]="false">
                <div class="flex flex-column align-items-center">
                    <i class="pi pi-check-circle text-green-500 text-5xl mb-3"></i>
                    <p>Your password has been updated successfully!</p>
                </div>
                <ng-template pTemplate="footer">
                    <div class="flex justify-content-center">
                        <p-button label="OK" (click)="navigateToLogin()" styleClass="p-button-text"></p-button>
                    </div>
                </ng-template>
            </p-dialog>
        </p-card>
    </div>
</div>
