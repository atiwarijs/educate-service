<div class="reset-password-container">
  <div class="reset-password-card">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>
    <form [formGroup]="resetForm" (ngSubmit)="submit()">
      <div class="form-field">
        <label for="newPassword">New Password</label>
        <input
          pPassword
          id="newPassword"
          formControlName="newPassword"
          placeholder="Enter new password"
          class="w-full"
        />
        <small
          *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"
          class="p-error"
        >
          Password must be at least 6 characters long.
        </small>
      </div>
      <div class="form-field">
        <label for="confirmPassword">Confirm Password</label>
        <input
          pPassword
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Confirm new password"
          class="w-full"
        />
        <small
          *ngIf="resetForm.get('confirmPassword')?.hasError('passwordMismatch') && resetForm.get('confirmPassword')?.touched"
          class="p-error"
        >
          Passwords do not match.
        </small>
      </div>
      <p-button
        label="Reset Password"
        type="submit"
        styleClass="w-full"
        [loading]="isSubmitting"
        [disabled]="resetForm.invalid"
      ></p-button>
    </form>
    <div class="back-to-login">
      <a routerLink="/login/auth">Back to Login</a>
    </div>
  </div>
</div>
