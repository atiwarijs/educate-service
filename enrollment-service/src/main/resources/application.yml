server:
  port: 8087
  servlet:
    context-path: /api/v1

spring:
  application:
    name: enrollment-service
  cloud:
    discovery:
      enabled: true

  profiles:
    active: mysql

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/securityrealm
          jwk-set-uri: http://localhost:8085/realms/securityrealm/protocol/openid-connect/certs

#  kafka:
#    bootstrap-servers: localhost:9092
