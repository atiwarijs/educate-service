#      enable-auto-commit: true
#      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
#      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
#    properties:
#      spring.json.trusted.packages: com.eduservices.profile.dto
#      spring.json.type.mapping: PersonalDetailsDto:com.eduservices.profile.dto.PersonalDetailsDto

management:
  server:
    port: 7004
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
   instance:
     hostname: localhost
   client:
     register-with-eureka: true
     fetch-registry: true
     service-url:
      defaultZone: http://localhost:8761/eureka/
